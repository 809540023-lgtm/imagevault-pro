version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./static/uploads:/app/static/uploads
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=vault_user
      - POSTGRES_PASSWORD=vault_pass
      - POSTGRES_DB=imagevault

volumes:
  postgres_data:
